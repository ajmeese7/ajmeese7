name: Update Blog Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Update README
        run: |
          python scripts/update-blog-posts.py
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "blog-posts-bot"
          git config user.email "blog-posts-bot@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update blog posts"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
